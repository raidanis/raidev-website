[phases.install]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views",
  "chmod -R 775 bootstrap/cache storage",
  "rm -rf public/build node_modules/.vite",
  "composer install --ignore-platform-reqs",
  "npm i"
]

[phases.build]
cmds = [
  "rm -rf public/build",
  "mkdir -p public/build",
  "npm run build",
  "echo '=== Build Output ==='; ls -la public/build/",
  "echo '=== Manifest Content ==='; cat public/build/manifest.json 2>/dev/null || echo 'No manifest found'",
  "cp public/css/style.css public/build/style.css 2>/dev/null || true",
  "cp public/js/main.js public/build/main.js 2>/dev/null || true",
  "echo '=== Final Build Contents ==='; ls -la public/build/",
  "chmod -R 755 public/build"
]
