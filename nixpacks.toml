[phases.install]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views public/build",
  "chmod -R 775 bootstrap/cache storage public/build",
  "composer install --ignore-platform-reqs",
  "npm i"
]

[phases.build]
cmds = [
  "npm run build",
  "if [ -f public/build/manifest.json ]; then echo 'Build successful - manifest.json created'; cat public/build/manifest.json; else echo 'Using fallback manifest'; fi",
  "cp public/css/style.css public/build/style.css 2>/dev/null || true",
  "cp public/js/main.js public/build/main.js 2>/dev/null || true",
  "ls -la public/build/",
  "chmod -R 755 public/build"
]
