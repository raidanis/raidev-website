[phases.install]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views",
  "chmod -R 775 bootstrap/cache storage",
  "composer install --ignore-platform-reqs",
  "npm i"
]

[phases.build]
cmds = [
  "echo 'Assets served directly from public/css and public/js'",
  "echo '=== CSS Files ==='; ls -la public/css/",
  "echo '=== JS Files ==='; ls -la public/js/",
  "chmod -R 755 public/css public/js"
]
