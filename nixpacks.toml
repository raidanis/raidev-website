[phases.install]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views public/build/assets",
  "chmod -R 775 bootstrap/cache storage public/build",
  "composer install --ignore-platform-reqs",
  "npm i"
]

[phases.build]
cmds = [
  "npm run build",
  "if [ -f public/build/manifest.json ]; then echo 'Build successful - manifest.json created'; cat public/build/manifest.json; else echo 'Using fallback manifest'; fi",
  "cp -f public/css/* public/build/assets/ 2>/dev/null || true",
  "cp -f public/js/* public/build/assets/ 2>/dev/null || true",
  "ls -la public/build/assets/ || true",
  "chmod -R 755 public/build"
]
